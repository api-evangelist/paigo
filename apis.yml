aid: paigo
name: Paigo
description: >-
  Paigo is a usage-based billing infrastructure platform with a REST API for
  metering API calls, tracking consumption, managing pricing tiers, and
  automating invoice generation for developer products. It supports pay-as-you-go,
  subscription tier, seat-based, custom unit, and top-up pricing models with
  zero transaction fees.
