            Example `{"stripeCustomerId": "cus_xxxxxxxxxxxxxx"}`'
          allOf:
          - $ref: '#/components/schemas/StripePaymentChannelOptions'
        address:
          description: The address of the customer
          allOf:
          - $ref: '#/components/schemas/Address'
        metadata:
          type: object
          description: 'An optional key-value map of additional metadata to associate with the customer.

            such as environment, purpose, owner, developer, contract number,

            or any arbitrary data to be associated with this usage record. Additionally, if `null` is passed for any value in the metadata object it will be removed.

            To entirely remove the metadata object, pass null to the metadata field.

            <br><br>

            Example `{"environment": "staging", "purpose": "proof-of-concept", "owner": "John Doe", "workspaceId": null}`

            <br><br>

            In the above example, the `workspaceId` metadata key will be removed from the dimension. To remove all fields pass the following.

            <br><br>

            Example `"metadata": null`'
        usage:
          description: 'Optionally, usage can be initally applied for a customer when they are enrolling in an offering.

            This is used for dimensions which have a paymentSchedule of `upfront` and need to have some usage for the intial enrollment.

            For example, a customer purchases 3 seats then on the enrollment a usage `recordValue` of 3 must be sent in for the time of purchase.

            Multiple usage records can be sent in, regardless of dimension. If usage records are sent in for a dimension that is not on the current offering, they will be loaded into paigo,

            but ignored on the invoice.

            <br><br>

            Example: `[{ "dimensionId": "539b7f74-3832-474e-a955-6d69c5df12d0", "customerId":"f918b6f4-2ad6-48c4-8b62-ac23adada9ae", "recordValue": 3, timestamp: "2021-01-01T00:00:00Z" }]`'
          example: '[{ "dimensionId": "539b7f74-3832-474e-a955-6d69c5df12d0", "customerId":"f918b6f4-2ad6-48c4-8b62-ac23adada9ae", "recordValue": 3, timestamp: "2021-01-01T00:00:00Z" }]'
          type: array
          items:
            $ref: '#/components/schemas/UsageForCustomerEnrollment'
    CreateCustomerRefundDto:
      type: object
      properties:
        reason:
          description: 'A stripe platform specific reason enum. Not required, will be defaulted to `"requested_by_customer"`

            <br><br>

            Example `"duplicate"`'
          example: duplicate
          enum:
          - duplicate
          - fraudulent
          - requested_by_customer
          type: string
          default: requested_by_customer
          externalDocs:
            url: https://stripe.com/docs/api/refunds/create#create_refund-reason
        amount:
          type: string
          description: 'The refund amount to be delivered to the customer. Currency is determined by the currency  Only numerical string is allowed.

            If no amount is specified the full amount of the payment will be refunded.

            <br><br>

            Example: `"10.00"` for $10.00.'
          example: '10.00'
        refundChannelOptions:
          description: 'Configuration options for the refund channel.

            See example below.

            <br><br>

            Example `{"paymentIntentId": "pi_1Gszkg2eZvKYlo2C6ZLlAL7u"}`'
          allOf:
          - $ref: '#/components/schemas/StripeRefundChannelOptions'
        metadata:
          type: object
          description: 'An optional key-value map of additional metadata to associate with this refund.

            This metadata will be passed to the final refund channel to correlate information between invoices,

            customers and other platform specific keys.

            <br><br>

            Example `{"environment": "staging", "purpose": "Outage reported", "owner": "John Doe", "invoiceId": "123-abc-456"}`'
      required:
      - refundChannelOptions
    ReadCustomerResponseData:
      type: object
      properties:
        taxExempt:
          description: 'Whether the customer is exempt from paying taxes

            <br><br>

            Example `"exempt"`'
          example: exempt
          enum:
          - exempt
          - none
          type: string
          default: none
        invoices:
          description: Array of invoices associated with a customer
          minItems: 0
          type: array
          items:
            $ref: '#/components/schemas/CustomerInvoiceMetadata'
        stripeAccountReady:
          type: boolean
          description: 'Whether the customer''s Stripe account has complete payment information

            This property is only set if the customer''s payment channel is Stripe

            <br><br>

            Example `true`'
          example: true
        discount:
          description: The specific customer level discount. This is the discount that is applied to the customer's overall bill.
          allOf:
          - $ref: '#/components/schemas/CustomerContractDiscount'
        children:
          description: The children of a customer group
          type: array
          items:
            $ref: '#/components/schemas/ReadChildRowResponseData'
            minimum: 0
        parent:
          description: The parent of a customer group
          allOf:
          - $ref: '#/components/schemas/ReadChildRowResponseData'
        offering:
          type: object
          description: The offering associated with a customer
        enrollments:
          type: array
          items:
            $ref: '#/components/schemas/CustomerEnrollmentResponseData'
        customerId:
          type: string
          description: 'Unique identifier assigned by Paigo

            <br><br>

            Example: `"e345f409-daca-4144-91d2-0a0f87c96581"`'
        customerName:
          type: string
          description: The friendly, human-readable name of the customer
        paymentChannel:
          description: The payment channel associated with a customer
          enum:
          - Stripe
          - manual
          type: string
        email:
          type: string
          description: 'Customer email address

            <br><br>

            Example: `"noreply@paigo.tech"`'
          example: noreply@paigo.tech
        paymentChannelOptions:
          description: 'Configuration options for the payment channel.

            For Stripe payment, `stripeCustomerId` is required.

            See example below.

            <br><br>

            Example `{"stripeCustomerId": "acct-xxxxxxxxxxxxxx"}`'
          allOf:
          - $ref: '#/components/schemas/StripePaymentChannelOptions'
        address:
          description: The address of the customer
          allOf:
          - $ref: '#/components/schemas/Address'
        customerVatId:
          type: string
          description: 'The VAT ID of the customer.

            Every VAT identification number must begin with the code of the country concerned and

            followed by a block of digits or characters.

            <br><br>

            Example `"GB VAT 123456789"`'
          example: GB VAT 123456789
        offeringId:
          type: string
          description: '<b> DEPRECATED </b>

            The unique identifier of the offering associated with a customer. Contains the most recent offering the customer is enrolled in. To be removed at a later release date. Please use the enrollments array instead.'
          example: e345f409-daca-4144-91d2-0a0f87c96581
        creditBalance:
          type: string
          description: 'The amount of credit in the customers'' account

            <br><br>

            Example `"100"`'
          example: '100'
        freeTrialEndDate:
          type: string
          description: '<b> DEPRECATED </b>

            The end date of the free trial for the offering. This is calculated from the current date and the free trial length. To be removed at a later release date. Please find the free trial end date on the enrollment object instead.

            <br><br>

            Example `"2020-12-31T23:59:59.999Z"`'
          example: '2020-12-31T23:59:59.999Z'
        offeringEnrollmentDate:
          type: string
          description: '<b> DEPRECATED </b>

            The date time when a customer enrolled for an offering. Please find this on the enrollment object instead

            <br><br>

            Example `"2020-12-30T23:59:59.999Z"`'
          example: '2020-12-30T23:59:59.999Z'
        freeTrialStartDate:
          type: string
          description: '<b> DEPRECATED </b>

            The start date of the free trial for the offering. This is determined when the customer is enrolled in the offering. To be removed at a later release date. Please find the free trial start date on the enrollment object instead.

            <br><br>

            Example `"2020-12-28T23:59:59.999Z"`'
          example: '2020-12-28T23:59:59.999Z'
        currency:
          description: 'The currency of the customer

            <br><br>

            Example `"USD"`'
          example: USD
          enum:
          - USD
          - EUR
          - CNY
          type: string
        metadata:
          type: object
      required:
      - offering
      - customerId
      - customerName
      - paymentChannel
    CustomerInvoiceMetadata:
      type: object
      properties:
        invoiceStatus:
          description: 'The invoice status

            <br><br>


            Example: `"Draft"`'
          example: Draft
          enum:
          - Draft
          - Open
          - Paid
          - Voided
          type: string
          externalDocs:
            url: https://docs.paigo.tech/invoice-and-process-payment/issue-invoice
            description: See Invoice Life Cycle section for more details
        invoicePaymentTerm:
          description: 'The payment term for the invoice

            <br><br>

            Example: `"30"`'
          example: 30
          enum:
          - '30'
          - '60'
          - ''
          type: string
        invoiceDate:
          type: string
          description: 'The date the invoice was issued

            <br><br>

            Example: `"2021-01-01T00:00:00.000Z"`'
          example: '2021-01-01T00:00:00.000Z'
        totalAmountWithoutTax:
          type: number
          description: 'The total amount of the invoice without tax

            <br><br>

            Example: `100.00`'
          example: 100
        taxAmount:
          type: number
          description: 'The total amount of tax on the invoice

            <br><br>

            Example: `10.00`'
          example: 10
        amountPaid:
          type: number
          description: 'The total amount paid by the customer so far for the invoice

            <br><br>

            Example: `110.00`'
          example: 110
        invoiceUrl:
          type: string
          description: 'The URL to download the invoice. URLs are self signed and valid for 7 days after the link is generated.

            <br><br>

            Example: `"https://my-cool-bucket.s3.amazonaws.com/invoices/123MyCoolCorp980/2021-01-01/123MyCoolCorp980-2021-01-01-1234567890.pdf"`'
          example: https://my-cool-bucket.s3.amazonaws.com/invoices/123MyCoolCorp980/2021-01-01/123MyCoolCorp980-2021-01-01-1234567890.pdf
        currency:
          description: 'The currency of the invoice. Defaults to USD

            <br><br>

            Example: `"USD"`'
          example: USD
          enum:
          - USD
          - EUR
          - CNY
          type: string
        paymentLink:
          type: string
          description: 'The payment link for the invoice. Only used for invoices in the `Draft` or `Open` status. Otherwise this field will not be present.

            <br><br>

            Example: `"https://example.com/redirect"`'
          example: https://example.com/redirect
        invoiceType:
          description: 'The type of invoice. This is used to indicate how the invoice was created, whether it was created manually, via a topup event, roccuring event, etc.

            <br><br>

            Example: `"TOPUP"`'
          example: TOPUP
          enum:
          - TOPUP
          - MANUAL
          - RECURRING
          type: string
        invoiceCommunicationHistory:
          type: array
          items:
            required: false
            description: 'The communication history of the invoice. This is used to track the communication between Paigo and the customer.

              <br><br>

              Example: `[]`'
            example: []
            type: array
            items:
              $ref: '#/components/schemas/InvoiceCommunicationHistory'
        lineItems:
          description: The line items on the invoice
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        refunds:
          description: The refunds associated with the invoice
          type: array
          items:
            $ref: '#/components/schemas/StripeRefundResponseDto'
        payments:
          description: The payments associated with the invoice
          type: array
          items:
            $ref: '#/components/schemas/ReadPaymentDto'
      required:
      - invoiceStatus
      - invoicePaymentTerm
      - invoiceDate
      - totalAmountWithoutTax
      - currency
      - invoiceCommunicationHistory
      - lineItems
      - refunds
      - payments
    KafkaDeploymentParametersDto:
      type: object
      properties:
        securityMechanism:
          type: string
          externalDocs:
            url: https://docs.confluent.io/platform/current/kafka/authentication_sasl/authentication_sasl_plain.html#sasl-plain-overview
          example: PLAIN
          description: 'The security protocol to use when connecting to the Kafka cluster. Defaults to `PLAIN`. Note this is not PLAINTEXT. PLAIN is the SASL_PLAIN protocol. <br><br> Example: `"PLAIN"`'
        username:
          type: string
          description: 'The username to use when connecting to the Kafka cluster. <br><br> Example: `"admin"`'
          example: admin
        password:
          type: string
          description: 'The password to use when connecting to the Kafka cluster. <br><br> Example: `"hunter2"`'
          example: hunter2
        bootstrapServerEndpoint:
          type: string
          description: 'The endpoint of the Kafka cluster to connect to. <br><br> Example: `"kafka.paigo.tech"`'
          example: kafka.paigo.tech
        topic:
          type: string
          description: 'The topic to subscribe to. <br><br> Example: `"test-topic"`'
          example: '"test-topic"'
        dlqTopic:
          type: string
          description: 'The DLQ topic to write to when a message fails to be processed. <br><br> Example: `"dlq-topic"`'
          example: '"dlq-topic"'
      required:
      - securityMechanism
      - username
      - password
      - bootstrapServerEndpoint
      - topic
      - dlqTopic
    UpdateCustomerEnrollmentDto:
      type: object
      properties:
        overrides:
          description: Overrides for the offering. Applies Customer specific overrides to the offering. Such as a discount or free trial or dimension specific overrides.
          allOf:
          - $ref: '#/components/schemas/CustomOverrides'
        offeringId:
          type: string
          description: 'Unique identifier for an offering assigned by Paigo. Including a new `"offeringId"` will "enroll" the customer in the specified offering. This may generate an invoice, in cases where relevant. Such as if the `"offeringType"` is a subscription offering. <br><br>

            To unenroll customers from an offering. Pass in `null`. This will remove the offering from the customer. This may generate an invoice, in cases where relevant. Such as if the `"offeringType"` is a usage-based offering. <br><br>

            Including the same `"offeringId" ` multiple times in a row will not change the state of the customer, nor generate an invoice. If an `"offeringId"` is not included, the customer will remain enrolled in the same offering. Including a new `"offeringId"` while a customer is enrolled in an offering, is considered a change of plan or "upgrade". In specific cases of upgrades some credit might be issued for the remainder of their plan. <br><br>

            <br><br>

            Example: `539b7f74-3832-474e-a955-6d69c5df12d0`'
          example: 539b7f74-3832-474e-a955-6d69c5df12d0
        removePriorOffering:
          type: boolean
          description: 'An optional flag to remove the prior offering from the customer. If set to `true`, the customer will be removed from all of their prior offerings. This may generate an invoice, in cases where relevant. Such as if the `"offeringType"` is a usage-based offering. If set to `false`, the customer will remain enrolled in the same offering.

            <br><br>

            Example: `true`'
          example: true
        unenrollOffering:
          type: string
          description: 'Used to specifically unenroll a customer from a singular offering. This may generate an invoice, in cases where relevant. Such as if the

            `"offeringType"` is a usage-based offering. Cannot be used in conjunction with `removePriorOffering` or enrolling a customer in a new

            offering with the`offeringId` field. A 400 error will be returned if this is the case.

            <br><br>

            Example: `"177735fe-5d06-49a7-a8fb-f5da11773345"`'
          example: 177735fe-5d06-49a7-a8fb-f5da11773345
        usage:
          description: 'Optionally, usage can be initally applied for a customer when they are enrolling in an offering.

            This is used for dimensions which have a paymentSchedule of `upfront` and need to have some usage for the intial enrollment.

            For example, a customer purchases 3 seats then on the enrollment a usage `recordValue` of 3 must be sent in for the time of purchase.

            Multiple usage records can be sent in, regardless of dimension. If usage records are sent in for a dimension that is not on the current offering, they will be loaded into paigo,

            but ignored on the invoice. Additionally, records must be unique in the sense that they cannot have the same dimensionId. Duplicates will cause the request to be rejected.

            <br><br>

            Example: `[{ "dimensionId": "539b7f74-3832-474e-a955-6d69c5df12d0", "recordValue": 3, timestamp: "2021-01-01T00:00:00Z" }]`'
          example: '[{ "dimensionId": "539b7f74-3832-474e-a955-6d69c5df12d0", "recordValue": 3, timestamp: "2021-01-01T00:00:00Z" }]'
          type: array
          items:
            $ref: '#/components/schemas/UsageForCustomerEnrollment'
    ReadPaymentDto:
      type: object
      properties:
        type:
          type: string
          description: 'The type of payment. Currently only `Credit` and `Stripe` are supported.

            <br><br>

            Example: `"Credit"`'
          example: Credit
          enum:
          - Stripe
          - Credit
        transactionAmount:
          type: string
          description: 'The amount associated with a specific credit transaction

            <br><br>

            Example: `"100.00"`'
          example: '100.00'
        timestamp:
          type: string
          description: 'The timestamp associated with a specific credit transaction. RFC3339 format.

            <br><br>

            Example: `"2021-01-01T00:00:00.000Z"`'
          example: '2021-01-01T00:00:00.000Z'
        metadata:
          type: object
          description: 'The metadata associated with a specific transaction. For `stripe` type responses, paymentIntentsId, currency, and status are included.

            <br><br>

            Example: `{"key": "value"}`'
      required:
      - type
      - transactionAmount
      - timestamp
      - metadata
    ReadMeasurementResponseData:
      type: object
      properties:
        measurementMode:
          type: string
          enum:
          - infrastructureBased
          - agentBased
          - datastoreBased
          example: infrastructureBased
          description: The measurement method. See <a href="https://docs.paigo.tech/measure-usage-and-collect-data/measure-and-collect-usage-data-at-production-scale">Measure and Collect Usage Data at Production Scale</a> for more information. <br><br> Example `"agentBased"`
        measurementConfiguration:
          description: Configuration for the measurement method.
          oneOf:
          - $ref: '#/components/schemas/InfrastructureAccessInformation'
          - $ref: '#/components/schemas/AgentAccessInformation'
          - $ref: '#/components/schemas/DatastoreAccessInformationResponse'
        measurementName:
          type: string
          description: 'The human readable name of the measurement

            <br><br>

            Example `"EBS Usage"`'
          example: EBS Usage
        measurementId:
          type: string
          description: 'Unique identifier assigned by Paigo.

            <br><br>

            Example `"de388932-a7e1-11ed-afa1-0242ac120002"`'
          example: de388932-a7e1-11ed-afa1-0242ac120002
      required:
      - measurementMode
      - measurementConfiguration
      - measurementId
    InvoiceCommunicationHistory:
      type: object
      properties:
        time:
          type: string
          description: 'The RFC 3339 time of communication that was sent to the customer.

            <br><br>

            Example: `"2022-01-01T00:00:00.000Z"`'
          example: '2022-01-01T00:00:00.000Z'
        type:
          type: string
          description: 'The type of communication that was sent to the customer.

            <br><br>

            Example: `INVOICE_EMAIL`'
          example: INVOICE_EMAIL
          enum:
          - REMINDER_EMAIL
          - INVOICE_EMAIL
        metadata:
          type: object
          description: 'The metadata of the communication that was sent to the customer.

            <br><br>

            Example: `{"subject": "Invoice for January 2022"}`'
    UsageResponseDocument:
      type: object
      properties:
        value:
          type: string
          description: 'The usage record value for the given dimension and time interval.

            Numerical values are represented as strings to avoid precision loss.

            <br><br>

            Example `"0.67"`'
          example: '0.67'
        startTime:
          type: string
          description: 'The start time of the time interval in ISO8601 format.

            <br><br>

            Example `"2021-01-01T00:00:00.000Z"`'
          example: '2021-01-01T00:00:00.000Z'
        endTime:
          type: string
          description: 'The end time of the time interval in ISO8601 format.

            <br><br>

            Example `"2021-01-01T00:00:00.000Z"`'
          example: '2021-01-01T00:00:00.000Z'
        metadataGroup:
          type: object
          description: 'An optional key-value map of additional metadata to associate with this usage record.

            This metadata is used to group usage records together.

            such as environment, purpose, owner, developer, contract number,

            or any arbitrary data to be associated with this usage record.

            <br><br>

            Example `{"environment": "staging", "purpose": "proof-of-concept", "owner": "John Doe"}`'
    DimensionTiersGroupByMetadataDto:
      type: object
      properties:
        metadataGroups:
          type: object
          description: 'The metadata groups to group the tiers by. A collection of key value pairs. metadata groups are used alongside the usage passed in to define more accurately how to break up price and usage for a dimension.

            <br><br>

            Example: `{ "instanceType": "t3.medium", "region": "us-east-1", "deployment": "production"}`'
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/DimensionTierDto'
      required:
      - metadataGroups
      - tiers
    CustomerAuthenticationTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: 'An JWT authentication token which specific customers can use to access their billing data from Paigo.

            <br><br>'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
          externalDocs:
            description: Read more about JWTs
            url: https://jwt.io/introduction/
      required:
      - access_token
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: oauth2
      in: Header
      description: Use bearer token to authenticate `Bearer <your access token>`
      flows:
        clientCredentials:
          tokenUrl: https://auth.paigo.tech/oauth/token
          scopes: {}
